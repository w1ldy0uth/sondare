name: Wheels

on:
  push:
    branches: ["dev", "v1.2.0_scrapy_snake"]
  pull_request:
    branches: ["master", "dev"]

jobs:
  wheels:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          manylinux: auto
      - name: Install and smoke-test
        shell: bash
        run: |
          pip install --find-links dist sondare --force-reinstall
          python -c "import sondare._sondare; print('sondare._sondare ok')"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/
